spring.application.name=cicd-ai-app
server.port=8081
# H2 DB configuration (Test Local - Sans Docker)
spring.datasource.url=jdbc:h2:file:./data/clientsdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
# Empêche DevTools de redémarrer l'appli quand le pipeline injecte des fichiers temporaires
spring.devtools.restart.exclude=**/temp_demo_only/**,**/Dockerfile.bad,**/*.md

# Expose l'endpoint Actuator Health pour la surveillance
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

gemini.model=gemini-2.5-pro
