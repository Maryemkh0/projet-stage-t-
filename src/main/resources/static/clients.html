<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Clients</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>DevOps AI Platform</h1>
        <nav>
            <a href="index.html">Dashboard</a>
            <a href="clients.html" class="active">Gestion Clients</a>
        </nav>
    </header>

    <main>
        <div class="dashboard-grid" style="grid-template-columns: 1fr 2fr;">
            <!-- Formulaire d'ajout -->
            <section class="glass-panel">
                <h2>Nouveau Client</h2>
                <form id="client-form" onsubmit="createClient(event)">
                    <label>Nom</label>
                    <input type="text" id="client-name" required placeholder="Ex: CODIX SA">
                    
                    <label>Email</label>
                    <input type="email" id="client-email" required placeholder="contact@codix.eu">
                    
                    <label>Description</label>
                    <textarea id="client-desc" rows="4" placeholder="Projet d'automatisation CI/CD..."></textarea>
                    
                    <button type="submit" class="btn" style="width: 100%; justify-content: center;">Ajouter le Client</button>
                </form>
            </section>

            <!-- Liste des clients -->
            <section class="glass-panel">
                <h2>Liste des Clients (Environnement Staging)</h2>
                <table id="clients-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nom</th>
                            <th>Email</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="clients-tbody">
                        <!-- Rempli par JS -->
                    </tbody>
                </table>
            </section>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        // Charger les clients au démarrage
        document.addEventListener('DOMContentLoaded', fetchClients);
    </script>
</body>
</html>
